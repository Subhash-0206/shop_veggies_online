server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://db.yzquiklehhohpdnhyxic.supabase.co:5432/postgres
    username: postgres
    password: shop_veggies_online
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${REMOTING_HOSTNAME:localhost}
    prefer-ip-address: ${PREFER_IP:true}
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
